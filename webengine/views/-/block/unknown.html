
<div class="banner-alert">
	<style>
	.banner-alert {
		background-color: #FEF0C7;
		border-bottom: 1px solid #E0C08A;
		padding: 14px 24px;
		font-family: Arial, sans-serif;
		display: flex;
		align-items: center;
		justify-content: space-between;
	}
	.banner-alert-content {
		display: flex;
		align-items: center;
		gap: 12px;
		flex: 1;
	}
	.banner-alert-icon {
		color: #F79009;
		font-size: 20px;
		line-height: 1;
		flex-shrink: 0;
	}
	.banner-alert-text {
		color: #93370D;
		font-size: 14px;
		line-height: 20px;
	}
	.banner-alert-text strong {
		font-weight: 700;
	}
	.banner-alert-actions {
		display: flex;
		align-items: center;
		gap: 12px;
		flex-shrink: 0;
		margin-left: 24px;
	}
	.banner-alert-cta {
		display: inline-block;
		background-color: #FFFFFF;
		color: #344054;
		border: 1px solid #D0D5DD;
		border-radius: 8px;
		padding: 8px 14px;
		cursor: pointer;
		font-size: 14px;
		font-weight: 600;
		text-decoration: none;
		line-height: 20px;
		white-space: nowrap;
	}
	.banner-alert-cta:hover {
		background-color: #F9FAFB;
	}
	.banner-alert-close {
		background: none;
		border: none;
		cursor: pointer;
		color: #93370D;
		font-size: 20px;
		line-height: 1;
		padding: 4px;
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.banner-alert-close:hover {
		opacity: 0.7;
	}
	</style>
	<div class="banner-alert-content">
		<span class="banner-alert-icon">⚠</span>
		<div class="banner-alert-text">
			{{if {!this.headline}}}<strong>{{this.headline}}</strong>{{end-if}}
			{{if {!this.subheadline}}}— {{this.subheadline}}{{end-if}}
		</div>
	</div>
	<div class="banner-alert-actions">
		{{if {!this.cta_text} && {!this.cta_link}}}
		<a href="{{this.cta_link}}" class="banner-alert-cta">{{this.cta_text}}</a>
		{{end-if}}
		<button class="banner-alert-close" onclick="this.closest('.banner-alert').style.display='none'" aria-label="Dismiss">&times;</button>
	</div>
</div>
